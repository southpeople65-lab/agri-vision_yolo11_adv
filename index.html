<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriVision AI - Live Detector</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        h1 { color: #22c55e; font-size: 1.8rem; text-align: center; margin: 10px 0; }
        
        /* Contenitore relativo per sovrapporre perfettamente video e rettangoli */
        #video-container { 
            position: relative; 
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; }
        
        /* Il canvas trasparente per i rettangoli si sovrappone al video */
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; /* Non blocca i tocchi sullo schermo */
        }
        
        #output { margin-top: 20px; padding: 15px; border-radius: 8px; background: #1e293b; border-left: 4px solid #22c55e; font-size: 1.2rem; font-weight: bold; text-align: center; }
        .status-tag { font-size: 0.8rem; color: #94a3b8; margin-top: 15px; text-align: center; }
    </style>
    <script src="libs/tf.min.js"></script>
    <script src="libs/tf-tflite.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>AgriVision AI</h1>
        <div id="video-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas> 
        </div>
        <div id="output">Inizializzazione...</div>
        <div class="status-tag">Ambiente: Offline PWA | Powered by TFLite</div>
    </div>
    <script src="script.js?v=31"></script>
</body>
</html>
